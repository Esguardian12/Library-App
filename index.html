<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Personal Library</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <header>
    <h1>📚 My Library</h1>
    <button id="new-book-btn">Add New Book</button>
  </header>

  <main>
    <div id="library-container" class="library-grid"></div>
  </main>

  <!-- Native HTML Modal Dialog for Form Submission -->
  <dialog id="book-dialog">
    <form id="book-form" method="dialog">
      <h2>Add a New Book</h2>
      
      <div class="form-control">
        <label for="title">Title:</label>
        <input type="text" id="title" required placeholder="The Hobbit">
      </div>

      <div class="form-control">
        <label for="author">Author:</label>
        <input type="text" id="author" required placeholder="J.R.R. Tolkien">
      </div>

      <div class="form-control">
        <label for="pages">Pages:</label>
        <input type="number" id="pages" required min="1" placeholder="295">
      </div>

      <div class="form-control checkbox">
        <label for="read">Have you read it?</label>
        <input type="checkbox" id="read">
      </div>

      <div class="form-actions">
        <button type="button" id="cancel-btn">Cancel</button>
        <button type="submit" id="submit-btn">Save Book</button>
      </div>
    </form>
  </dialog>
</body>
</html>
